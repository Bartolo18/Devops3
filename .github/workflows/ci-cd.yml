name: CI/CD Hola Mundo

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    name: Pruebas, auditoria y build
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Ejecutar pruebas
        run: npm test

      - name: Medir cobertura
        run: npm run coverage

      - name: Validar cumplimiento
        run: npm run audit:quality

      - name: Construir imagen Docker
        run: docker build -t hola-mundo-devops:${{ github.sha }} .

  deploy:
    name: Despliegue en EC2
    needs: quality
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on:
      - self-hosted
      - ep3
      - deploy
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Desplegar con Docker Compose
        run: |
          docker compose up -d --build --remove-orphans
          docker compose ps

      - name: Validar servicio desplegado
        run: |
          sleep 5
          curl --fail http://localhost:8082/health
